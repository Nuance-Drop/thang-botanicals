<div class="container" style="max-width: 600px; margin: 2rem auto; padding: 0 1rem;">
  <h1>Contact Us</h1>
  <form action="https://formspree.io/f/your_formspree_id" method="POST">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required style="width:100%; padding:0.5rem; margin-bottom:1rem;">
   
    <label for="email">Email</label>
    <input type="email" id="email" name="_replyto" required style="width:100%; padding:0.5rem; margin-bottom:1rem;">
   
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required style="width:100%; padding:0.5rem; margin-bottom:1rem;"></textarea>
   
    <button type="submit" class="btn-gold">Send</button>
  </form>
</div>
